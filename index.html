<title>ClaudeMatch</title>

<style>
/* ============================
   Design Tokens — iOS Native
   ============================ */
:root {
  /* Accent */
  --accent: #007AFF;

  /* Background */
  --bg: #F2F2F7;
  --card-bg: #FFFFFF;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.04);

  /* Navigation & Tab Bar */
  --nav-bg: rgba(242, 242, 247, 0.80);
  --tab-bar-bg: rgba(255, 255, 255, 0.72);

  /* Text */
  --label: #000000;
  --secondary-label: rgba(60, 60, 67, 0.60);
  --tertiary-label: rgba(60, 60, 67, 0.30);

  /* Fills */
  --fill-secondary: rgba(120, 120, 128, 0.08);
  --fill-tertiary: rgba(120, 120, 128, 0.04);
  --tertiary-fill: rgba(120, 120, 128, 0.12);

  /* Segmented control */
  --segmented-bg: rgba(120, 120, 128, 0.08);
  --segmented-active: #FFFFFF;

  /* Search */
  --search-bg: rgba(120, 120, 128, 0.08);

  /* Separator */
  --separator: rgba(60, 60, 67, 0.12);
  --selected-bg: rgba(0, 122, 255, 0.06);

  /* Shadows */
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
}

[data-theme="dark"] {
  --accent: #0A84FF;

  --bg: #000000;
  --card-bg: #1C1C1E;
  --card-shadow: 0 1px 3px rgba(0,0,0,0.20);

  --nav-bg: rgba(0, 0, 0, 0.64);
  --tab-bar-bg: rgba(28, 28, 30, 0.72);

  --label: #FFFFFF;
  --secondary-label: rgba(235, 235, 245, 0.60);
  --tertiary-label: rgba(235, 235, 245, 0.30);

  --fill-secondary: rgba(120, 120, 128, 0.20);
  --fill-tertiary: rgba(120, 120, 128, 0.12);
  --tertiary-fill: rgba(120, 120, 128, 0.24);

  --segmented-bg: rgba(120, 120, 128, 0.20);
  --segmented-active: #636366;

  --search-bg: rgba(120, 120, 128, 0.16);

  --separator: rgba(84, 84, 88, 0.65);
  --selected-bg: rgba(10, 132, 255, 0.12);

  --shadow-sm: 0 1px 2px rgba(0,0,0,0.30);
}

/* Base */
*, *::before, *::after {
  box-sizing: border-box;
}

html, body {
  margin: 0;
  height: 100%;
  overscroll-behavior: none;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-family: -apple-system, "SF Pro Text", "Helvetica Neue", "PingFang SC", "Noto Sans SC", sans-serif;
  background: var(--bg);
  color: var(--label);
  transition: background 0.3s ease, color 0.3s ease;
}

body {
  background: #111;
  display: grid;
  place-items: center;
}

/* App container — full bleed on mobile, phone frame on desktop */
#app {
  width: 100vw;
  height: 100vh;
  background: var(--bg);
  padding-top: env(safe-area-inset-top, 0px);
  padding-bottom: env(safe-area-inset-bottom, 0px);
  transition: background 0.3s ease;
  overflow: hidden;
  position: relative;
}

@media (min-width: 700px) {
  #app {
    width: 390px;
    height: 844px;
    border-radius: 44px;
    overflow: hidden;
    box-shadow: 0 30px 80px rgba(0,0,0,0.35), 0 0 0 1px rgba(255,255,255,0.05);
  }
}

/* Scrollbar */
::-webkit-scrollbar { width: 0; }
::-webkit-scrollbar-thumb { display: none; }

/* Toast animation */
@keyframes toastIn {
  from { opacity: 0; transform: translateX(-50%) translateY(10px); }
  to { opacity: 1; transform: translateX(-50%) translateY(0); }
}

/* Selection */
::selection {
  background: var(--accent);
  color: #fff;
}

/* Button Reset */
button {
  font-family: inherit;
  -webkit-tap-highlight-color: transparent;
}

button:active {
  opacity: 0.7;
}
</style>
</head>

<div id="root"></div>
